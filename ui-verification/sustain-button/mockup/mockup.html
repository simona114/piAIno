<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sustain toggle - full screen mockup (on state)</title>
<style>
  :root {
    --frame-bar-color: #1C1B1F;
    --frame-bar-border-color: #3A3A3D;
    --white-key-color: #FFFBFE;
    --white-key-pressed: #C9C9C9;
    --white-key-border: #1C1B1F;
    --black-key-color: #3A3A3D;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #000;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  }

  .label {
    color: #fff;
    font-size: 13px;
    text-align: center;
    padding: 8px 0 4px;
  }

  /* Full landscape screen, approximating the locked-landscape Piano screen. */
  .screen {
    position: relative;
    width: 880px;
    height: 396px;
    background: #fff;
    overflow: hidden;
  }

  .frame-bar {
    position: relative;
    width: 100%;
    height: 18%; /* matches FrameBarHeightFraction = 0.18f */
    background: var(--frame-bar-color);
    border-bottom: 3px solid var(--frame-bar-border-color);
    display: flex;
    align-items: center; /* true vertical centering across the whole bar, both ends */
    justify-content: space-between;
  }

  .sustain-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 12px;
  }

  .sustain-label {
    color: var(--white-key-color);
    font-size: 16px;
    font-weight: 500;
  }

  .switch-track {
    width: 52px;
    height: 32px;
    border-radius: 16px;
    border: 2px solid var(--white-key-color);
    background: var(--white-key-color);
    position: relative;
    box-sizing: border-box;
  }

  .switch-thumb {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--black-key-color);
  }

  .settings-button {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: var(--black-key-color);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
  }

  .settings-button svg {
    width: 24px;
    height: 24px;
    fill: var(--white-key-color);
  }

  .keyboard {
    position: relative;
    width: 100%;
    height: 82%;
  }

  .white-key {
    position: absolute;
    top: 0;
    width: 80px;
    height: 100%;
    background: var(--white-key-color);
    border-right: 2px solid var(--white-key-border);
    box-sizing: border-box;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 10px;
    font-weight: bold;
    font-size: 24px;
  }

  .black-key {
    position: absolute;
    top: 0;
    width: 48px;
    height: 60%;
    background: var(--black-key-color);
    transform: translateX(-50%);
  }

  .c-f { color: #C0392B; }
  .c-g { color: #D81B60; }
  .c-a { color: #6A1B9A; }
  .c-b { color: #1976D2; }
  .c-c { color: #2E7D32; }
  .c-d { color: #F57F17; }
  .c-e { color: #E64A19; }
</style>
</head>
<body>
  <div class="label">Sustain ON - full screen</div>
  <div class="screen">
    <div class="frame-bar">
      <div class="sustain-toggle">
        <span class="sustain-label">Sustain</span>
        <div class="switch-track"><div class="switch-thumb"></div></div>
      </div>
      <div class="settings-button">
        <svg viewBox="0 0 24 24">
          <path d="M19.14,12.94c0.04,-0.3 0.06,-0.61 0.06,-0.94c0,-0.32 -0.02,-0.64 -0.07,-0.94l2.03,-1.58c0.18,-0.14 0.23,-0.41 0.12,-0.61 l-1.92,-3.32c-0.12,-0.22 -0.37,-0.29 -0.59,-0.22l-2.39,0.96c-0.5,-0.38 -1.03,-0.7 -1.62,-0.94L14.4,2.81 c-0.04,-0.24 -0.24,-0.41 -0.48,-0.41h-3.84c-0.24,0 -0.43,0.17 -0.47,0.41L9.25,5.35c-0.59,0.24 -1.13,0.57 -1.62,0.94L5.24,5.33 c-0.22,-0.08 -0.47,0 -0.59,0.22L2.74,8.87C2.62,9.08 2.66,9.34 2.86,9.48l2.03,1.58C4.84,11.36 4.8,11.69 4.8,12 s0.02,0.64 0.07,0.94l-2.03,1.58c-0.18,0.14 -0.23,0.41 -0.12,0.61l1.92,3.32c0.12,0.22 0.37,0.29 0.59,0.22l2.39,-0.96 c0.5,0.38 1.03,0.7 1.62,0.94l0.36,2.54c0.05,0.24 0.24,0.41 0.48,0.41h3.84c0.24,0 0.44,-0.17 0.47,-0.41l0.36,-2.54 c0.59,-0.24 1.13,-0.56 1.62,-0.94l2.39,0.96c0.22,0.08 0.47,0 0.59,-0.22l1.92,-3.32c0.12,-0.22 0.07,-0.47 -0.12,-0.61 L19.14,12.94z M12,15.6c-1.98,0 -3.6,-1.62 -3.6,-3.6s1.62,-3.6 3.6,-3.6s3.6,1.62 3.6,3.6S13.98,15.6 12,15.6z"/>
        </svg>
      </div>
    </div>
    <div class="keyboard">
      <div class="white-key c-f" style="left: 0px;">F</div>
      <div class="white-key c-g" style="left: 80px;">G</div>
      <div class="white-key c-a" style="left: 160px;">A</div>
      <div class="white-key c-b" style="left: 240px;">B</div>
      <div class="white-key c-c" style="left: 320px;">C</div>
      <div class="white-key c-d" style="left: 400px;">D</div>
      <div class="white-key c-e" style="left: 480px;">E</div>
      <div class="white-key c-f" style="left: 560px;">F</div>
      <div class="white-key c-g" style="left: 640px;">G</div>
      <div class="white-key c-a" style="left: 720px;">A</div>
      <div class="white-key c-b" style="left: 800px;">B</div>
      <div class="black-key" style="left: 80px;"></div>
      <div class="black-key" style="left: 160px;"></div>
      <div class="black-key" style="left: 240px;"></div>
      <div class="black-key" style="left: 400px;"></div>
      <div class="black-key" style="left: 480px;"></div>
      <div class="black-key" style="left: 640px;"></div>
      <div class="black-key" style="left: 720px;"></div>
      <div class="black-key" style="left: 800px;"></div>
    </div>
  </div>
</body>
</html>
