<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>piAIno mockup - Piano key press feedback</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .phone-screen {
    width: 100vw;
    height: 100vh;
    background-color: #1C1B1F;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
  }
  .frame-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 11.65%;
    background-color: #1C1B1F;
    border-bottom: 3px solid #3A3A3D;
    box-sizing: border-box;
  }
  .keyboard {
    position: absolute;
    top: 11.65%;
    left: 0;
    width: 100%;

    height: 88.35%;
    display: flex;
  }
  .white-key {
    flex: 1 1 0;
    height: 100%;
    background-color: #FFFBFE;
    border: 2px solid #1C1B1F;
    box-sizing: border-box;
  }
  .white-key.pressed {
    background-color: #C9C9C9;
  }
  .black-key {
    position: absolute;
    top: 11.65%;
    width: 8.5714%;
    height: 52.91%;
    background-color: #3A3A3D;
    box-sizing: border-box;
  }
  .black-key.pressed {
    background-color: #1C1B1F;
  }
</style>
</head>
<body>
  <div class="phone-screen">
    <div class="frame-bar"></div>
    <div class="keyboard">
      <div class="white-key pressed"></div>
      <div class="white-key"></div>
      <div class="white-key"></div>
      <div class="white-key"></div>
      <div class="white-key"></div>
      <div class="white-key"></div>
      <div class="white-key"></div>
    </div>
    <!-- Black keys: C# D# (gap E-F) F# G# A# (gap after B) -->
    <div class="black-key" style="left: 10.0000%;"></div>
    <div class="black-key" style="left: 24.2857%;"></div>
    <div class="black-key" style="left: 52.8572%;"></div>
    <div class="black-key pressed" style="left: 67.1429%;"></div>
    <div class="black-key" style="left: 81.4286%;"></div>
  </div>
</body>
</html>
